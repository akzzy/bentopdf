{{#if simpleMode}} {{> navbar-simple}} {{else}}
<nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-30">
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center h-16">
      <div
        class="flex-shrink-0 flex items-center cursor-pointer hover:opacity-90 transition-opacity"
        id="home-logo"
      >
        <a
          href="index.html"
          class="flex items-stretch border-2 border-indigo-600 md:ml-2"
        >
          <div
            class="bg-indigo-600 text-[#ffffff] font-bold text-xl px-1.5 py-1 flex items-center justify-center"
          >
            PDF
          </div>
          <div
            class="text-white font-bold text-xl px-3 py-1 flex items-center justify-center bg-transparent min-w-[7rem]"
          >
            {{#if brandName}}{{brandName}}{{else}}Local Edit{{/if}}
          </div>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8">
        <a href="index.html" class="nav-link" data-i18n="nav.home">Home</a>
        <a href="about.html" class="nav-link" data-i18n="nav.about">About</a>
        <a href="contact.html" class="nav-link" data-i18n="nav.contact"
          >Contact</a
        >

        <a
          href="index.html#tools-header"
          class="nav-link"
          data-i18n="nav.allTools"
          >All Tools</a
        >

        <button
          id="theme-toggle-desktop"
          class="text-gray-400 hover:text-indigo-400 transition-colors p-2 rounded-full focus:outline-none"
          aria-label="Toggle Dark Mode"
        >
          <i data-lucide="sun" class="w-5 h-5 hidden dark-icon"></i>
          <i data-lucide="moon" class="w-5 h-5 light-icon"></i>
        </button>
      </div>

      <!-- Mobile Hamburger Button -->
      <div class="md:hidden flex items-center gap-4">
        <button
          id="mobile-menu-button"
          type="button"
          class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500 transition-colors"
          aria-controls="mobile-menu"
          aria-expanded="false"
        >
          <span class="sr-only" data-i18n="nav.openMainMenu"
            >Open main menu</span
          >
          <!-- Hamburger Icon -->
          <svg
            id="menu-icon"
            class="block h-6 w-6"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
          <!-- Close Icon -->
          <svg
            id="close-icon"
            class="hidden h-6 w-6"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Dropdown -->
  <div
    id="mobile-menu"
    class="hidden md:hidden bg-gray-800 border-t border-gray-700"
  >
    <div class="px-2 pt-2 pb-3 space-y-1 text-center">
      <a href="index.html" class="mobile-nav-link" data-i18n="nav.home">Home</a>
      <a href="about.html" class="mobile-nav-link" data-i18n="nav.about"
        >About</a
      >
      <a href="contact.html" class="mobile-nav-link" data-i18n="nav.contact"
        >Contact</a
      >

      <a
        href="index.html#tools-header"
        class="mobile-nav-link"
        data-i18n="nav.allTools"
        >All Tools</a
      >

      <button
        id="theme-toggle-mobile"
        class="w-full flex items-center justify-center p-2 mt-2 text-gray-400 hover:text-indigo-400 transition-colors rounded-md focus:outline-none"
        aria-label="Toggle Dark Mode"
      >
        <span class="mr-2 hidden dark-text">Light Mode</span>
        <span class="mr-2 light-text">Dark Mode</span>
        <i data-lucide="sun" class="w-5 h-5 hidden dark-icon"></i>
        <i data-lucide="moon" class="w-5 h-5 light-icon"></i>
      </button>
    </div>
  </div>
</nav>
{{/if}}
