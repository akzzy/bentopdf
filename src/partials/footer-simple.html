<footer class="mt-16 border-t-2 border-gray-700 py-8" data-simple-footer="true">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <div class="flex items-center mb-4">
          <div class="flex items-stretch border-2 border-indigo-600">
            <div
              class="bg-indigo-600 text-[#ffffff] font-bold text-xl px-1.5 py-1 flex items-center justify-center"
            >
              PDF
            </div>
            <div
              class="text-white font-bold text-xl px-3 py-1 flex items-center justify-center bg-transparent min-w-[7rem]"
            >
              {{#if brandName}}{{brandName}}{{else}}Local Edit{{/if}}
            </div>
          </div>
        </div>
        <p id="footer-copyright" class="text-gray-400 text-sm">
          {{#if footerText}}{{footerText}}{{else}}&copy; 2026 Local Edit. All
          rights reserved.{{/if}}
        </p>
        <p class="text-gray-500 text-xs mt-2">
          Version <span id="app-version-simple"></span>
        </p>
      </div>
      <div id="simple-mode-lang-switcher" class="flex-shrink-0"></div>
    </div>
  </div>
</footer>
